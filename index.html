<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Inventario Simple</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #232340;
            --text: #e0e7ff;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
            --accent: #a78bfa;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .header-stat-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .header-stat-label {
            opacity: 0.9;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .config-panel {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .config-panel h2 {
            margin-bottom: 1.5rem;
            color: var(--accent);
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.75rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.2);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .content-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .content-card h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .search-box {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg);
        }

        th {
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: var(--bg-card-hover);
        }

        .alert {
            padding: 1.25rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .loading::before {
            content: '⏳';
            display: block;
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .header-stats {
                gap: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>📦 Inventario Simple</h1>
            <div class="header-stats">
                <div>
                    <div class="header-stat-value" id="headerProductos">-</div>
                    <div class="header-stat-label">Productos</div>
                </div>
                <div>
                    <div class="header-stat-value" id="headerMovimientos">-</div>
                    <div class="header-stat-label">Movimientos</div>
                </div>
            </div>
        </div>
    </div>

    <div id="configPanel" class="config-panel">
        <h2>⚙️ Configuración</h2>
        <div class="input-group">
            <label>URL del Backend</label>
            <input type="text" id="apiUrl" placeholder="https://tu-app.railway.app/api" value="https://inventario-app-production-e8c8.up.railway.app/api">
        </div>
        <div class="input-group">
            <label>Código de Empresa</label>
            <input type="text" id="empresaId" placeholder="123456789" value="123456789">
        </div>
        <button class="btn" onclick="conectarAPI()">🔌 Conectar</button>
        <div id="connectionMessage"></div>
    </div>

    <div id="appContent" class="hidden">
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value" id="statProductos">0</div>
                    <div class="stat-label">Productos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📥</div>
                    <div class="stat-value" id="statEntradas">0</div>
                    <div class="stat-label">Total Entradas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📤</div>
                    <div class="stat-value" id="statSalidas">0</div>
                    <div class="stat-label">Total Salidas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="statMovimientos">0</div>
                    <div class="stat-label">Movimientos</div>
                </div>
            </div>

            <div class="content-card">
                <h2>📦 Inventario Actual</h2>
                <div class="search-box">
                    <input type="text" placeholder="Buscar producto..." onkeyup="filtrarInventario(this.value)">
                </div>
                <div class="table-container">
                    <table id="tablaInventario">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Producto</th>
                                <th>Unidad</th>
                                <th>Stock Actual</th>
                                <th>Entradas</th>
                                <th>Salidas</th>
                                <th>Movimientos</th>
                            </tr>
                        </thead>
                        <tbody id="inventarioBody">
                            <tr>
                                <td colspan="7" class="loading">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let API_BASE = '';
        let EMPRESA_ID = '';
        let inventarioData = [];

        async function conectarAPI() {
            API_BASE = document.getElementById('apiUrl').value.replace(/\/+$/, '');
            EMPRESA_ID = document.getElementById('empresaId').value;
            
            const msgDiv = document.getElementById('connectionMessage');
            msgDiv.innerHTML = '<div class="loading">Conectando...</div>';

            try {
                const response = await fetch(`${API_BASE}/inventario/stats?empresa=${EMPRESA_ID}`);
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success) {
                    msgDiv.innerHTML = '<div class="alert alert-success">✅ ¡Conectado!</div>';
                    
                    setTimeout(() => {
                        document.getElementById('configPanel').classList.add('hidden');
                        document.getElementById('appContent').classList.remove('hidden');
                        cargarDatos();
                    }, 1000);
                } else {
                    throw new Error('Respuesta inválida');
                }
            } catch (error) {
                console.error('Error:', error);
                msgDiv.innerHTML = `
                    <div class="alert alert-error">
                        ❌ Error: ${error.message}<br>
                        Verifica la URL y el código de empresa
                    </div>
                `;
            }
        }

        async function cargarDatos() {
            try {
                // Stats
                const statsRes = await fetch(`${API_BASE}/inventario/stats?empresa=${EMPRESA_ID}`);
                const statsData = await statsRes.json();
                
                if (statsData.success) {
                    document.getElementById('headerProductos').textContent = statsData.data.total_productos;
                    document.getElementById('headerMovimientos').textContent = statsData.data.total_movimientos;
                    document.getElementById('statProductos').textContent = statsData.data.total_productos;
                    document.getElementById('statEntradas').textContent = statsData.data.total_entradas_global;
                    document.getElementById('statSalidas').textContent = statsData.data.total_salidas_global;
                    document.getElementById('statMovimientos').textContent = statsData.data.total_movimientos;
                }

                // Inventario
                const invRes = await fetch(`${API_BASE}/inventario?empresa=${EMPRESA_ID}`);
                const invData = await invRes.json();
                
                if (invData.success) {
                    inventarioData = invData.data;
                    renderInventario();
                }
                
            } catch (error) {
                console.error('Error cargando datos:', error);
                document.getElementById('inventarioBody').innerHTML = `
                    <tr><td colspan="7" style="text-align: center; color: var(--danger);">
                        ❌ Error al cargar datos
                    </td></tr>
                `;
            }
        }

        function renderInventario() {
            const tbody = document.getElementById('inventarioBody');
            
            if (inventarioData.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="7" style="text-align: center;">
                        No hay productos en inventario
                    </td></tr>
                `;
                return;
            }

            let html = '';
            inventarioData.forEach(item => {
                html += `
                    <tr>
                        <td><strong>${item.codigo}</strong></td>
                        <td>${item.nombre}</td>
                        <td>${item.unidad || '-'}</td>
                        <td><strong style="color: var(--accent);">${item.stock_actual}</strong></td>
                        <td style="color: var(--success);">${item.total_entradas}</td>
                        <td style="color: var(--danger);">${item.total_salidas}</td>
                        <td>${item.movimientos}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function filtrarInventario(texto) {
            const filas = document.querySelectorAll('#tablaInventario tbody tr');
            const textoLower = texto.toLowerCase();

            filas.forEach(fila => {
                const contenido = fila.textContent.toLowerCase();
                fila.style.display = contenido.includes(textoLower) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
