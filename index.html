<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --text: #e0e7ff;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .config-panel {
            max-width: 500px;
            margin: 1.5rem auto;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .config-panel h2 {
            margin-bottom: 1rem;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 0.7rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .filters {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        .filter-item {
            flex: 1;
        }

        .filter-item label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 0.6rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
        }

        .content-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead {
            background: var(--bg);
        }

        th {
            padding: 0.6rem 0.8rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.7rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }
            
            table {
                font-size: 0.75rem;
            }

            th, td {
                padding: 0.4rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 Inventario</h1>
    </div>

    <div id="configPanel" class="config-panel">
        <h2>⚙️ Configuración</h2>
        <div class="input-group">
            <label>URL del Backend</label>
            <input type="text" id="apiUrl" value="https://inventario-app-production-e8c8.up.railway.app/api">
        </div>
        <div class="input-group">
            <label>Código de Empresa</label>
            <input type="text" id="empresaId" value="123456789">
        </div>
        <button class="btn" onclick="conectarAPI()">🔌 Conectar</button>
        <div id="connectionMessage"></div>
    </div>

    <div id="appContent" class="hidden">
        <div class="container">
            <div class="filters">
                <div class="filter-item">
                    <label>Centro de Costo</label>
                    <select id="ccostoSelect" onchange="cargarInventario()">
                        <option value="">Cargando...</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Buscar Producto</label>
                    <input type="text" placeholder="Nombre o código..." onkeyup="filtrarInventario(this.value)">
                </div>
            </div>

            <div class="content-card">
                <div class="table-container">
                    <table id="tablaInventario">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Producto</th>
                                <th>Unidad</th>
                                <th>Stock Actual</th>
                            </tr>
                        </thead>
                        <tbody id="inventarioBody">
                            <tr>
                                <td colspan="4" class="loading">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let API_BASE = '';
        let EMPRESA_ID = '';
        let inventarioData = [];
        let ccostosData = [];

        async function conectarAPI() {
            API_BASE = document.getElementById('apiUrl').value.replace(/\/+$/, '');
            EMPRESA_ID = document.getElementById('empresaId').value;
            
            const msgDiv = document.getElementById('connectionMessage');
            msgDiv.innerHTML = '<div class="loading">Conectando...</div>';

            try {
                const response = await fetch(`${API_BASE}/inventario/stats?empresa=${EMPRESA_ID}`);
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success) {
                    msgDiv.innerHTML = '<div class="alert alert-success">✅ Conectado</div>';
                    
                    setTimeout(() => {
                        document.getElementById('configPanel').classList.add('hidden');
                        document.getElementById('appContent').classList.remove('hidden');
                        cargarCCostos();
                    }, 800);
                } else {
                    throw new Error('Respuesta inválida');
                }
            } catch (error) {
                console.error('Error:', error);
                msgDiv.innerHTML = `
                    <div class="alert alert-error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }

        async function cargarCCostos() {
            try {
                const response = await fetch(`${API_BASE}/ccostos?empresa=${EMPRESA_ID}`);
                const data = await response.json();
                
                if (data.success) {
                    ccostosData = data.data;
                    const select = document.getElementById('ccostoSelect');
                    
                    let html = '<option value="">-- Todos los Centros de Costo --</option>';
                    ccostosData.forEach(cc => {
                        html += `<option value="${cc.codigo}">${cc.codigo} - ${cc.nombre}</option>`;
                    });
                    
                    select.innerHTML = html;
                    cargarInventario();
                }
            } catch (error) {
                console.error('Error cargando ccostos:', error);
                document.getElementById('ccostoSelect').innerHTML = '<option value="">Error al cargar</option>';
            }
        }

        async function cargarInventario() {
            const ccosto = document.getElementById('ccostoSelect').value;
            
            try {
                let url = `${API_BASE}/inventario?empresa=${EMPRESA_ID}`;
                if (ccosto) {
                    url += `&ccosto=${ccosto}`;
                }

                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    inventarioData = data.data;
                    renderInventario();
                }
                
            } catch (error) {
                console.error('Error cargando inventario:', error);
                document.getElementById('inventarioBody').innerHTML = `
                    <tr><td colspan="4" style="text-align: center; color: #ef4444;">
                        ❌ Error al cargar datos
                    </td></tr>
                `;
            }
        }

        function renderInventario() {
            const tbody = document.getElementById('inventarioBody');
            
            if (inventarioData.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="4" style="text-align: center; padding: 2rem;">
                        No hay productos en este centro de costo
                    </td></tr>
                `;
                return;
            }

            let html = '';
            inventarioData.forEach(item => {
                html += `
                    <tr>
                        <td><strong>${item.codigo}</strong></td>
                        <td>${item.nombre}</td>
                        <td>${item.unidad || '-'}</td>
                        <td><strong style="color: #a78bfa;">${item.stock_actual}</strong></td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function filtrarInventario(texto) {
            const filas = document.querySelectorAll('#tablaInventario tbody tr');
            const textoLower = texto.toLowerCase();

            filas.forEach(fila => {
                const contenido = fila.textContent.toLowerCase();
                fila.style.display = contenido.includes(textoLower) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
