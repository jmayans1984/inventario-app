<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Inventario Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #232340;
            --text: #e0e7ff;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
            --accent: #a78bfa;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1), transparent 50%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .header-stat {
            text-align: center;
        }

        .header-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header-stat-label {
            opacity: 0.9;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .config-panel {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .config-panel h2 {
            margin-bottom: 1.5rem;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg);
            border: 2px solid var(--border);
            margin-top: 0.75rem;
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .navbar {
            display: flex;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 0.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .navbar button {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
            position: relative;
        }

        .navbar button:hover {
            color: var(--text);
            background: rgba(99, 102, 241, 0.1);
        }

        .navbar button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.75rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 4px 10px rgba(99, 102, 241, 0.3));
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .content-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .content-card h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .search-box {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead {
            background: var(--bg);
            position: sticky;
            top: 0;
        }

        th {
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            transition: all 0.2s;
        }

        tbody tr:hover {
            background: var(--bg-card-hover);
        }

        .badge {
            display: inline-block;
            padding: 0.375rem 0.875rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .chart-container {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .alert {
            padding: 1.25rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .loading::before {
            content: '⏳';
            display: block;
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .header-stats {
                gap: 1rem;
                font-size: 0.8rem;
            }

            .navbar {
                flex-direction: column;
                gap: 0.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>📦 Inventario Pro - CONECTADO</h1>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-value" id="headerTotalProductos">...</div>
                    <div class="header-stat-label">Productos</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="headerAlerta">...</div>
                    <div class="header-stat-label">Alertas</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="headerValor">...</div>
                    <div class="header-stat-label">Valor Total</div>
                </div>
            </div>
        </div>
    </div>

    <div class="config-panel">
        <h2>⚙️ Configurar URL del Backend</h2>
        <div class="input-group">
            <label>URL del API Backend (Railway)</label>
            <input type="text" id="apiUrl" placeholder="https://tu-app.railway.app/api" value="">
        </div>
        <div class="input-group">
            <label>Código de Empresa</label>
            <input type="text" id="empresaId" placeholder="1" value="1">
        </div>
        <button class="btn" onclick="conectarAPI()">🔌 Conectar al Backend</button>
        <div id="connectionMessage"></div>
    </div>

    <div id="appContent" class="hidden">
        <div class="container">
            <div class="navbar">
                <button class="active" onclick="cambiarVista('dashboard', this)">📊 Dashboard</button>
                <button onclick="cambiarVista('inventario', this)">📦 Inventario</button>
                <button onclick="cambiarVista('ordenes', this)">🛒 Órdenes</button>
                <button onclick="cambiarVista('facturas', this)">🧾 Facturas</button>
            </div>
            <div id="mainContent"></div>
        </div>
    </div>

    <script>
        // CONFIGURA AQUÍ TU URL DE RAILWAY
        const DEFAULT_API_URL = 'PEGA_AQUI_TU_URL_DE_RAILWAY/api';
        
        let API_BASE = '';
        let EMPRESA_ID = '1';
        let datosInventario = [];
        let datosOrdenes = [];
        let datosFacturas = [];
        let charts = {};

        // Conectar al API
        async function conectarAPI() {
            const apiUrl = document.getElementById('apiUrl').value || DEFAULT_API_URL;
            EMPRESA_ID = document.getElementById('empresaId').value || '1';
            
            if (!apiUrl || apiUrl === 'PEGA_AQUI_TU_URL_DE_RAILWAY/api') {
                document.getElementById('connectionMessage').innerHTML = `
                    <div class="alert alert-error" style="margin-top: 1rem;">
                        ⚠️ Por favor configura la URL de tu backend de Railway primero
                    </div>
                `;
                return;
            }

            API_BASE = apiUrl.replace(/\/+$/, ''); // Quitar slash final si existe
            
            const msgDiv = document.getElementById('connectionMessage');
            msgDiv.innerHTML = '<div class="loading">Conectando al backend...</div>';

            try {
                const response = await fetch(`${API_BASE}/dashboard?empresa=${EMPRESA_ID}`);
                
                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.success) {
                    msgDiv.innerHTML = `
                        <div class="alert alert-success" style="margin-top: 1rem;">
                            ✅ ¡Conectado exitosamente a tu base de datos!
                        </div>
                    `;
                    
                    setTimeout(() => {
                        document.querySelector('.config-panel').classList.add('hidden');
                        document.getElementById('appContent').classList.remove('hidden');
                        cargarDatosReales();
                    }, 1500);
                } else {
                    throw new Error('Respuesta inválida del servidor');
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                msgDiv.innerHTML = `
                    <div class="alert alert-error" style="margin-top: 1rem;">
                        ❌ <strong>Error al conectar</strong><br>
                        ${error.message}<br><br>
                        Verifica que:<br>
                        1. La URL del backend esté correcta<br>
                        2. El backend esté desplegado en Railway<br>
                        3. Las variables de entorno estén configuradas
                    </div>
                `;
            }
        }

        // Cargar datos reales
        async function cargarDatosReales() {
            try {
                // Dashboard
                const dashRes = await fetch(`${API_BASE}/dashboard?empresa=${EMPRESA_ID}`);
                const dashData = await dashRes.json();
                
                // Inventario
                const invRes = await fetch(`${API_BASE}/inventario?empresa=${EMPRESA_ID}`);
                const invData = await invRes.json();
                
                // Órdenes
                const ordRes = await fetch(`${API_BASE}/ordenes?empresa=${EMPRESA_ID}`);
                const ordData = await ordRes.json();
                
                // Facturas
                const facRes = await fetch(`${API_BASE}/facturas?empresa=${EMPRESA_ID}`);
                const facData = await facRes.json();
                
                datosInventario = invData.data || [];
                datosOrdenes = ordData.data || [];
                datosFacturas = facData.data || [];
                
                actualizarHeaderStats();
                cambiarVista('dashboard');
                
            } catch (error) {
                console.error('Error cargando datos:', error);
                alert('Error al cargar los datos. Verifica la conexión.');
            }
        }

        // Actualizar header stats
        function actualizarHeaderStats() {
            const totalProductos = datosInventario.length;
            const alertas = datosInventario.filter(p => ['BAJO', 'CRITICO', 'SIN_STOCK'].includes(p.nivel_stock)).length;
            const valorTotal = datosInventario.reduce((sum, p) => sum + parseFloat(p.valor_inventario || 0), 0);

            document.getElementById('headerTotalProductos').textContent = totalProductos;
            document.getElementById('headerAlerta').textContent = alertas;
            document.getElementById('headerValor').textContent = formatCurrency(valorTotal);
        }

        // Formatear moneda
        function formatCurrency(value) {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0
            }).format(value || 0);
        }

        // Cambiar vista
        function cambiarVista(vista, btn) {
            if (btn) {
                document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            Object.values(charts).forEach(chart => {
                if (chart) chart.destroy();
            });
            charts = {};

            switch(vista) {
                case 'dashboard':
                    mostrarDashboard();
                    break;
                case 'inventario':
                    mostrarInventario();
                    break;
                case 'ordenes':
                    mostrarOrdenes();
                    break;
                case 'facturas':
                    mostrarFacturas();
                    break;
            }
        }

        // Dashboard
        function mostrarDashboard() {
            const stockBajo = datosInventario.filter(p => ['BAJO', 'CRITICO'].includes(p.nivel_stock)).length;
            const sinStock = datosInventario.filter(p => p.nivel_stock === 'SIN_STOCK').length;
            const valorTotal = datosInventario.reduce((sum, p) => sum + parseFloat(p.valor_inventario || 0), 0);
            const totalOrdenes = datosOrdenes.reduce((sum, o) => sum + parseFloat(o.total || 0), 0);
            const totalFacturas = datosFacturas.reduce((sum, f) => sum + parseFloat(f.total || 0), 0);

            const html = `
                <div class="content-card">
                    <h2>📊 Dashboard General - DATOS REALES</h2>
                    <div class="alert alert-success">✅ Conectado a Aiven PostgreSQL</div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">📦</div>
                            <div class="stat-value">${datosInventario.length}</div>
                            <div class="stat-label">Total Productos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">⚠️</div>
                            <div class="stat-value">${stockBajo}</div>
                            <div class="stat-label">Stock Bajo</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">❌</div>
                            <div class="stat-value">${sinStock}</div>
                            <div class="stat-label">Sin Stock</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💰</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${formatCurrency(valorTotal)}</div>
                            <div class="stat-label">Valor Inventario</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🛒</div>
                            <div class="stat-value">${datosOrdenes.length}</div>
                            <div class="stat-label">Órdenes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💵</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${formatCurrency(totalOrdenes)}</div>
                            <div class="stat-label">Total Órdenes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧾</div>
                            <div class="stat-value">${datosFacturas.length}</div>
                            <div class="stat-label">Facturas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💸</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${formatCurrency(totalFacturas)}</div>
                            <div class="stat-label">Total Ventas</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        // Inventario
        function mostrarInventario() {
            let html = `
                <div class="content-card">
                    <h2>📦 Inventario - Base de Datos Real</h2>
                    <div class="search-box">
                        <input type="text" placeholder="Buscar producto..." onkeyup="filtrarInventario(this.value)">
                    </div>
                    <div class="table-container">
                        <table id="tablaInventario">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Producto</th>
                                    <th>Grupo</th>
                                    <th>Stock</th>
                                    <th>Mínimo</th>
                                    <th>Estado</th>
                                    <th>Costo</th>
                                    <th>Valor Total</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            datosInventario.forEach(p => {
                const badgeClass = p.nivel_stock === 'NORMAL' ? 'badge-success' : 
                                  p.nivel_stock === 'BAJO' ? 'badge-warning' : 'badge-danger';
                
                html += `
                    <tr>
                        <td><strong>${p.codigo}</strong></td>
                        <td>${p.nombre}</td>
                        <td>${p.grupo_nombre || '-'}</td>
                        <td><strong>${p.stock_actual}</strong></td>
                        <td>${p.stock_minimo}</td>
                        <td><span class="badge ${badgeClass}">${p.nivel_stock}</span></td>
                        <td>${formatCurrency(p.costo_promedio)}</td>
                        <td><strong>${formatCurrency(p.valor_inventario)}</strong></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        function filtrarInventario(texto) {
            const filas = document.querySelectorAll('#tablaInventario tbody tr');
            const textoLower = texto.toLowerCase();

            filas.forEach(fila => {
                const contenido = fila.textContent.toLowerCase();
                fila.style.display = contenido.includes(textoLower) ? '' : 'none';
            });
        }
