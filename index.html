<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Inventario Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #232340;
            --text: #e0e7ff;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
            --accent: #a78bfa;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header con gradiente animado */
        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1), transparent 50%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .header-stat {
            text-align: center;
        }

        .header-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header-stat-label {
            opacity: 0.9;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Config Panel */
        .config-panel {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .config-panel h2 {
            margin-bottom: 1.5rem;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg);
            border: 2px solid var(--border);
            margin-top: 0.75rem;
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Navbar con efecto glass */
        .navbar {
            display: flex;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 0.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .navbar button {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
            position: relative;
        }

        .navbar button:hover {
            color: var(--text);
            background: rgba(99, 102, 241, 0.1);
        }

        .navbar button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .navbar button.active::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 3px;
            background: var(--accent);
            border-radius: 10px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.75rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 4px 10px rgba(99, 102, 241, 0.3));
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        /* Content Card */
        .content-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .content-card h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        /* Search */
        .search-box {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead {
            background: var(--bg);
            position: sticky;
            top: 0;
        }

        th {
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            transition: all 0.2s;
        }

        tbody tr:hover {
            background: var(--bg-card-hover);
        }

        .badge {
            display: inline-block;
            padding: 0.375rem 0.875rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .chart-container {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        /* Alerts */
        .alert {
            padding: 1.25rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .hidden {
            display: none;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .loading::before {
            content: '⏳';
            display: block;
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .header-stats {
                gap: 1rem;
                font-size: 0.8rem;
            }

            .navbar {
                flex-direction: column;
                gap: 0.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <h1>📦 Inventario Pro</h1>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-value" id="headerTotalProductos">0</div>
                    <div class="header-stat-label">Productos</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="headerAlerta">0</div>
                    <div class="header-stat-label">Alertas</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="headerValor">$0</div>
                    <div class="header-stat-label">Valor Total</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Config Panel -->
    <div id="configPanel" class="config-panel">
        <h2>⚙️ Configuración PostgreSQL</h2>
        <div class="input-group">
            <label>Host / IP</label>
            <input type="text" id="dbHost" placeholder="localhost" value="localhost">
        </div>
        <div class="input-group">
            <label>Puerto</label>
            <input type="text" id="dbPort" placeholder="5432" value="5432">
        </div>
        <div class="input-group">
            <label>Base de Datos</label>
            <input type="text" id="dbName" placeholder="nombre_bd">
        </div>
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="dbUser" placeholder="postgres" value="postgres">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="dbPassword" placeholder="****">
        </div>
        <div class="input-group">
            <label>Código Empresa</label>
            <input type="text" id="empresaId" placeholder="1" value="1">
        </div>
        <button class="btn" onclick="conectarBD()">🔌 Conectar a PostgreSQL</button>
        <button class="btn btn-secondary" onclick="usarDatosPrueba()">📊 Ver Datos de Ejemplo</button>
        <div id="connectionMessage"></div>
    </div>

    <!-- App Content -->
    <div id="appContent" class="hidden">
        <div class="container">
            <!-- Navbar -->
            <div class="navbar">
                <button class="active" onclick="cambiarVista('dashboard', this)">📊 Dashboard</button>
                <button onclick="cambiarVista('inventario', this)">📦 Inventario</button>
                <button onclick="cambiarVista('ordenes', this)">🛒 Órdenes</button>
                <button onclick="cambiarVista('facturas', this)">🧾 Facturas</button>
            </div>

            <!-- Main Content -->
            <div id="mainContent"></div>
        </div>
    </div>

    <script>
        // Variables globales
        let datosInventario = [];
        let datosOrdenes = [];
        let datosFacturas = [];
        let usandoDatosPrueba = false;
        let charts = {};

        // Conectar BD
        function conectarBD() {
            const msgDiv = document.getElementById('connectionMessage');
            msgDiv.innerHTML = `
                <div class="alert alert-error" style="margin-top: 1rem;">
                    ⚠️ <strong>Conexión directa no disponible desde navegador</strong><br><br>
                    Por seguridad, los navegadores no pueden conectarse directamente a PostgreSQL.<br><br>
                    <strong>Usa "Ver Datos de Ejemplo"</strong> para ver cómo funciona el sistema.
                </div>
            `;
        }

        // Usar datos de prueba
        function usarDatosPrueba() {
            usandoDatosPrueba = true;
            cargarDatosPrueba();
            actualizarHeaderStats();
            document.getElementById('configPanel').classList.add('hidden');
            document.getElementById('appContent').classList.remove('hidden');
            cambiarVista('dashboard');
        }

        // Cargar datos de prueba
        function cargarDatosPrueba() {
            datosInventario = [
                { codigo: 'PROD001', nombre: 'Tornillos 1/4"', stock: 150, minimo: 100, costo: 5000, estado: 'NORMAL', grupo: 'Ferretería' },
                { codigo: 'PROD002', nombre: 'Tuercas M6', stock: 45, minimo: 50, costo: 3000, estado: 'BAJO', grupo: 'Ferretería' },
                { codigo: 'PROD003', nombre: 'Arandelas', stock: 0, minimo: 100, costo: 2000, estado: 'SIN_STOCK', grupo: 'Ferretería' },
                { codigo: 'PROD004', nombre: 'Pernos 3/8"', stock: 200, minimo: 80, costo: 8000, estado: 'NORMAL', grupo: 'Ferretería' },
                { codigo: 'PROD005', nombre: 'Clavos 2"', stock: 35, minimo: 60, costo: 1500, estado: 'CRITICO', grupo: 'Construcción' },
                { codigo: 'PROD006', nombre: 'Alambre calibre 12', stock: 500, minimo: 100, costo: 12000, estado: 'NORMAL', grupo: 'Eléctrico' },
                { codigo: 'PROD007', nombre: 'Soldadura E6013', stock: 25, minimo: 40, costo: 25000, estado: 'BAJO', grupo: 'Herramientas' },
                { codigo: 'PROD008', nombre: 'Pintura anticorrosiva', stock: 80, minimo: 30, costo: 45000, estado: 'NORMAL', grupo: 'Pinturas' },
                { codigo: 'PROD009', nombre: 'Cable eléctrico 2x12', stock: 300, minimo: 150, costo: 18000, estado: 'NORMAL', grupo: 'Eléctrico' },
                { codigo: 'PROD010', nombre: 'Cemento gris 50kg', stock: 15, minimo: 30, costo: 35000, estado: 'CRITICO', grupo: 'Construcción' },
                { codigo: 'PROD011', nombre: 'Arena lavada m³', stock: 10, minimo: 5, costo: 65000, estado: 'NORMAL', grupo: 'Construcción' },
                { codigo: 'PROD012', nombre: 'Grava m³', stock: 8, minimo: 5, costo: 70000, estado: 'NORMAL', grupo: 'Construcción' }
            ];

            datosOrdenes = [
                { codigo: 'OC001', fecha: '2024-04-20', cliente: 'Ferretería Central', total: 1500000, estado: 'PENDIENTE' },
                { codigo: 'OC002', fecha: '2024-04-18', cliente: 'Construcciones ABC', total: 3200000, estado: 'APROBADA' },
                { codigo: 'OC003', fecha: '2024-04-15', cliente: 'Taller Don José', total: 850000, estado: 'RECIBIDA' },
                { codigo: 'OC004', fecha: '2024-04-12', cliente: 'Obras Civiles SAS', total: 2100000, estado: 'APROBADA' },
                { codigo: 'OC005', fecha: '2024-04-10', cliente: 'Eléctricos del Norte', total: 950000, estado: 'RECIBIDA' }
            ];

            datosFacturas = [
                { codigo: 'FV001', fecha: '2024-04-22', cliente: 'Juan Pérez', total: 125000, tipo_pago: 'EFECTIVO' },
                { codigo: 'FV002', fecha: '2024-04-21', cliente: 'María García', total: 380000, tipo_pago: 'TRANSFERENCIA' },
                { codigo: 'FV003', fecha: '2024-04-20', cliente: 'Construcciones XYZ', total: 1250000, tipo_pago: 'CRÉDITO' },
                { codigo: 'FV004', fecha: '2024-04-19', cliente: 'Pedro Rodríguez', total: 95000, tipo_pago: 'EFECTIVO' },
                { codigo: 'FV005', fecha: '2024-04-18', cliente: 'Taller Mecánico', total: 450000, tipo_pago: 'TRANSFERENCIA' },
                { codigo: 'FV006', fecha: '2024-04-17', cliente: 'Casa López', total: 280000, tipo_pago: 'CRÉDITO' }
            ];
        }

        // Actualizar stats del header
        function actualizarHeaderStats() {
            const totalProductos = datosInventario.length;
            const alertas = datosInventario.filter(p => p.estado !== 'NORMAL').length;
            const valorTotal = datosInventario.reduce((sum, p) => sum + (p.stock * p.costo), 0);

            document.getElementById('headerTotalProductos').textContent = totalProductos;
            document.getElementById('headerAlerta').textContent = alertas;
            document.getElementById('headerValor').textContent = formatCurrency(valorTotal);
        }

        // Cambiar vista
        function cambiarVista(vista, btn) {
            if (btn) {
                document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            // Limpiar charts anteriores
            Object.values(charts).forEach(chart => {
                if (chart) chart.destroy();
            });
            charts = {};

            switch(vista) {
                case 'dashboard':
                    mostrarDashboard();
                    break;
                case 'inventario':
                    mostrarInventario();
                    break;
                case 'ordenes':
                    mostrarOrdenes();
                    break;
                case 'facturas':
                    mostrarFacturas();
                    break;
            }
        }

        // Formatear moneda
        function formatCurrency(value) {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0
            }).format(value || 0);
        }

        // Dashboard
        function mostrarDashboard() {
            const stockBajo = datosInventario.filter(p => p.estado === 'BAJO' || p.estado === 'CRITICO').length;
            const sinStock = datosInventario.filter(p => p.estado === 'SIN_STOCK').length;
            const valorTotal = datosInventario.reduce((sum, p) => sum + (p.stock * p.costo), 0);
            const totalOrdenes = datosOrdenes.reduce((sum, o) => sum + o.total, 0);
            const totalFacturas = datosFacturas.reduce((sum, f) => sum + f.total, 0);

            const html = `
                <div class="content-card">
                    <h2>📊 Dashboard General</h2>
                    ${usandoDatosPrueba ? '<div class="alert alert-success">✅ Mostrando datos de ejemplo - Explora el sistema</div>' : ''}
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">📦</div>
                            <div class="stat-value">${datosInventario.length}</div>
                            <div class="stat-label">Total Productos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">⚠️</div>
                            <div class="stat-value">${stockBajo}</div>
                            <div class="stat-label">Stock Bajo</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">❌</div>
                            <div class="stat-value">${sinStock}</div>
                            <div class="stat-label">Sin Stock</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💰</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${formatCurrency(valorTotal)}</div>
                            <div class="stat-label">Valor Inventario</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🛒</div>
                            <div class="stat-value">${datosOrdenes.length}</div>
                            <div class="stat-label">Órdenes Compra</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💵</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${formatCurrency(totalOrdenes)}</div>
                            <div class="stat-label">Total Órdenes</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🧾</div>
                            <div class="stat-value">${datosFacturas.length}</div>
                            <div class="stat-label">Facturas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💸</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${formatCurrency(totalFacturas)}</div>
                            <div class="stat-label">Total Ventas</div>
                        </div>
                    </div>

                    <div class="charts-grid">
                        <div class="chart-container">
                            <div class="chart-title">Estado del Inventario</div>
                            <canvas id="chartEstadoInventario"></canvas>
                        </div>
                        <div class="chart-container">
                            <div class="chart-title">Inventario por Grupo</div>
                            <canvas id="chartPorGrupo"></canvas>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;

            // Crear gráficas
            setTimeout(() => {
                crearGraficaEstadoInventario();
                crearGraficaPorGrupo();
            }, 100);
        }

        // Gráfica estado inventario
        function crearGraficaEstadoInventario() {
            const ctx = document.getElementById('chartEstadoInventario');
            if (!ctx) return;

            const normal = datosInventario.filter(p => p.estado === 'NORMAL').length;
            const bajo = datosInventario.filter(p => p.estado === 'BAJO').length;
            const critico = datosInventario.filter(p => p.estado === 'CRITICO').length;
            const sinStock = datosInventario.filter(p => p.estado === 'SIN_STOCK').length;

            charts.estadoInventario = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Normal', 'Stock Bajo', 'Crítico', 'Sin Stock'],
                    datasets: [{
                        data: [normal, bajo, critico, sinStock],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#64748b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { size: 12 } }
                        }
                    }
                }
            });
        }

        // Gráfica por grupo
        function crearGraficaPorGrupo() {
            const ctx = document.getElementById('chartPorGrupo');
            if (!ctx) return;

            const grupos = {};
            datosInventario.forEach(p => {
                grupos[p.grupo] = (grupos[p.grupo] || 0) + 1;
            });

            const labels = Object.keys(grupos);
            const data = Object.values(grupos);

            charts.porGrupo = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Productos',
                        data: data,
                        backgroundColor: '#6366f1',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#2d2d44' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Inventario
        function mostrarInventario() {
            let html = `
                <div class="content-card">
                    <h2>📦 Inventario Completo</h2>
                    <div class="search-box">
                        <input type="text" placeholder="Buscar producto por nombre o código..." onkeyup="filtrarInventario(this.value)">
                    </div>
                    <div class="table-container">
                        <table id="tablaInventario">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Producto</th>
                                    <th>Grupo</th>
                                    <th>Stock</th>
                                    <th>Mínimo</th>
                                    <th>Estado</th>
                                    <th>Costo Unit.</th>
                                    <th>Valor Total</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            datosInventario.forEach(p => {
                const badgeClass = p.estado === 'NORMAL' ? 'badge-success' : 
                                  p.estado === 'BAJO' ? 'badge-warning' : 'badge-danger';
                const valorTotal = p.stock * p.costo;
                
                html += `
                    <tr>
                        <td><strong>${p.codigo}</strong></td>
                        <td>${p.nombre}</td>
                        <td>${p.grupo}</td>
                        <td><strong>${p.stock}</strong></td>
                        <td>${p.minimo}</td>
                        <td><span class="badge ${badgeClass}">${p.estado}</span></td>
                        <td>${formatCurrency(p.costo)}</td>
                        <td><strong>${formatCurrency(valorTotal)}</strong></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        // Filtrar inventario
        function filtrarInventario(texto) {
            const filas = document.querySelectorAll('#tablaInventario tbody tr');
            const textoLower = texto.toLowerCase();

            filas.forEach(fila => {
                const contenido = fila.textContent.toLowerCase();
                fila.style.display = contenido.includes(textoLower) ? '' : 'none';
            });
        }

        // Órdenes
        function mostrarOrdenes() {
            let html = `
                <div class="content-card">
                    <h2>🛒 Órdenes de Compra</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Fecha</th>
                                    <th>Cliente</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            datosOrdenes.forEach(o => {
                html += `
                    <tr>
                        <td><strong>${o.codigo}</strong></td>
                        <td>${o.fecha}</td>
                        <td>${o.cliente}</td>
                        <td><strong>${formatCurrency(o.total)}</strong></td>
                        <td><span class="badge badge-success">${o.estado}</span></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        // Facturas
        function mostrarFacturas() {
            let html = `
                <div class="content-card">
                    <h2>🧾 Facturas / Ventas</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Fecha</th>
                                    <th>Cliente</th>
                                    <th>Tipo Pago</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            datosFacturas.forEach(f => {
                html += `
                    <tr>
                        <td><strong>${f.codigo}</strong></td>
                        <td>${f.fecha}</td>
                        <td>${f.cliente}</td>
                        <td><span class="badge badge-success">${f.tipo_pago}</span></td>
                        <td><strong>${formatCurrency(f.total)}</strong></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }
    </script>
</body>
</html>
