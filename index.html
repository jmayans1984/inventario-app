<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0a0a0f;
            --bg-card: #16161d;
            --bg-hover: #1f1f28;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #2d2d3a;
            --grupo-1: #1e3a8a;
            --grupo-2: #7c2d12;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* LOGIN SCREEN */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            padding: 2rem;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* HEADER */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-empresa {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .btn-logout {
            padding: 0.6rem 1.2rem;
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* FILTERS */
        .filters {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        .filter-item {
            flex: 1;
        }

        .filter-item label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 0.7rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
        }

        /* TABLE */
        .content-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: var(--bg);
        }

        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* COLORES ALTERNADOS POR GRUPO - CON MÁS CONTRASTE */
        tbody tr.grupo-1 {
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.25) 0%, rgba(30, 58, 138, 0.15) 100%);
        }

        tbody tr.grupo-2 {
            background: linear-gradient(90deg, rgba(124, 45, 18, 0.25) 0%, rgba(124, 45, 18, 0.15) 100%);
        }

        tbody tr.grupo-1:hover {
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.35) 0%, rgba(30, 58, 138, 0.25) 100%);
        }

        tbody tr.grupo-2:hover {
            background: linear-gradient(90deg, rgba(124, 45, 18, 0.35) 0%, rgba(124, 45, 18, 0.25) 100%);
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .filters {
                flex-direction: column;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 0.5rem 0.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE LOGIN -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>📦 Inventario</h1>
                <p>Ingresa tus credenciales</p>
            </div>
            <div id="loginMessage"></div>
            <form onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="loginUsuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="btnLogin">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <!-- PANTALLA DE SELECCIÓN DE EMPRESA -->
    <div id="empresaScreen" class="login-container hidden">
        <div class="login-box">
            <div class="login-header">
                <h1>🏢 Selecciona Empresa</h1>
                <p id="empresaUsuarioNombre"></p>
            </div>
            <div class="form-group">
                <label>Empresa</label>
                <select id="empresaSelect" size="5" style="height: 200px;">
                    <option value="">Cargando...</option>
                </select>
            </div>
            <button class="btn" onclick="seleccionarEmpresa()">Continuar</button>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL - INVENTARIO -->
    <div id="appScreen" class="hidden">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1>📦 Sistema de Inventario</h1>
                    <p id="headerSubtitle">Cargando...</p>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-name" id="headerUsuario"></div>
                        <div class="user-empresa" id="headerEmpresa"></div>
                    </div>
                    <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="filters">
                <div class="filter-item">
                    <label>Centro de Costo</label>
                    <select id="ccostoSelect" onchange="cargarInventario()">
                        <option value="">Cargando...</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Buscar Producto</label>
                    <input type="text" placeholder="Nombre o código..." onkeyup="filtrarInventario(this.value)">
                </div>
            </div>

            <div class="content-card">
                <div class="table-container">
                    <table id="tablaInventario">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Producto</th>
                                <th>Unidad</th>
                                <th>Stock Actual</th>
                            </tr>
                        </thead>
                        <tbody id="inventarioBody">
                            <tr>
                                <td colspan="4" class="loading">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://inventario-app-production-e8c8.up.railway.app/api';
        let sesion = {
            codigo: null,
            usuario: null,
            nombre: null,
            empresa: null,
            empresaNombre: null,
            empresas: []
        };
        let inventarioData = [];

        // Verificar sesión al cargar
        window.addEventListener('DOMContentLoaded', () => {
            const sesionGuardada = localStorage.getItem('sesion');
            if (sesionGuardada) {
                sesion = JSON.parse(sesionGuardada);
                mostrarApp();
            }
        });

        // LOGIN
        async function login() {
            const usuario = document.getElementById('loginUsuario').value;
            const clave = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            const btnLogin = document.getElementById('btnLogin');

            btnLogin.disabled = true;
            btnLogin.textContent = 'Verificando...';
            msgDiv.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, clave })
                });

                const data = await response.json();

                if (data.success) {
                    sesion.codigo = data.data.codigo;
                    sesion.usuario = data.data.usuario;
                    sesion.nombre = data.data.nombre;
                    sesion.empresas = data.data.empresas;

                    if (data.data.requiere_seleccion) {
                        // Mostrar selector de empresas
                        mostrarSelectorEmpresas();
                    } else {
                        // Login directo
                        sesion.empresa = data.data.empresas[0].empresa;
                        sesion.empresaNombre = data.data.empresas[0].empresa_nombre;
                        guardarSesion();
                        mostrarApp();
                    }
                } else {
                    msgDiv.innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Iniciar Sesión';
                }
            } catch (error) {
                console.error('Error:', error);
                msgDiv.innerHTML = `<div class="alert alert-error">❌ Error de conexión</div>`;
                btnLogin.disabled = false;
                btnLogin.textContent = 'Iniciar Sesión';
            }
        }

        // MOSTRAR SELECTOR DE EMPRESAS
        function mostrarSelectorEmpresas() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('empresaScreen').classList.remove('hidden');
            document.getElementById('empresaUsuarioNombre').textContent = sesion.nombre;

            const select = document.getElementById('empresaSelect');
            let html = '';
            sesion.empresas.forEach(emp => {
                html += `<option value="${emp.empresa}">${emp.empresa} - ${emp.empresa_nombre}</option>`;
            });
            select.innerHTML = html;
        }

        // SELECCIONAR EMPRESA
        function seleccionarEmpresa() {
            const select = document.getElementById('empresaSelect');
            const empresaId = select.value;

            if (!empresaId) {
                alert('Por favor selecciona una empresa');
                return;
            }

            const empresaSeleccionada = sesion.empresas.find(e => e.empresa == empresaId);
            sesion.empresa = empresaSeleccionada.empresa;
            sesion.empresaNombre = empresaSeleccionada.empresa_nombre;

            guardarSesion();
            mostrarApp();
        }

        // GUARDAR SESIÓN
        function guardarSesion() {
            localStorage.setItem('sesion', JSON.stringify(sesion));
        }

        // MOSTRAR APP
        function mostrarApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('empresaScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');

            document.getElementById('headerUsuario').textContent = sesion.nombre;
            document.getElementById('headerEmpresa').textContent = sesion.empresaNombre;
            document.getElementById('headerSubtitle').textContent = `Centro de Costo: Todos`;

            cargarCCostos();
        }

        // LOGOUT
        function logout() {
            if (confirm('¿Cerrar sesión?')) {
                localStorage.removeItem('sesion');
                location.reload();
            }
        }

        // CARGAR CENTROS DE COSTO
        async function cargarCCostos() {
            try {
                const response = await fetch(`${API_BASE}/ccostos?empresa=${sesion.empresa}`);
                const data = await response.json();

                if (data.success) {
                    const select = document.getElementById('ccostoSelect');
                    let html = '<option value="">-- Todos los Centros de Costo --</option>';
                    data.data.forEach(cc => {
                        html += `<option value="${cc.codigo}">${cc.codigo} - ${cc.nombre}</option>`;
                    });
                    select.innerHTML = html;
                    cargarInventario();
                }
            } catch (error) {
                console.error('Error cargando ccostos:', error);
            }
        }

        // CARGAR INVENTARIO
        async function cargarInventario() {
            const ccosto = document.getElementById('ccostoSelect').value;

            try {
                let url = `${API_BASE}/inventario?empresa=${sesion.empresa}`;
                if (ccosto) {
                    url += `&ccosto=${ccosto}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    inventarioData = data.data;
                    renderInventario();
                }
            } catch (error) {
                console.error('Error cargando inventario:', error);
                document.getElementById('inventarioBody').innerHTML = `
                    <tr><td colspan="4" style="text-align: center; color: var(--danger);">
                        ❌ Error al cargar datos
                    </td></tr>
                `;
            }
        }

        // RENDER INVENTARIO
        function renderInventario() {
            const tbody = document.getElementById('inventarioBody');

            if (inventarioData.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="4" style="text-align: center; padding: 2rem;">
                        No hay productos en este centro de costo
                    </td></tr>
                `;
                return;
            }

            let html = '';
            let currentGrupo = null;
            let grupoIndex = 0;

            inventarioData.forEach(item => {
                if (item.grupo_codigo !== currentGrupo) {
                    currentGrupo = item.grupo_codigo;
                    grupoIndex = grupoIndex === 0 ? 1 : 0;
                }

                const grupoClass = grupoIndex === 0 ? 'grupo-1' : 'grupo-2';
                const stockFormateado = parseFloat(item.stock_actual).toFixed(2);

                html += `
                    <tr class="${grupoClass}">
                        <td><strong>${item.codigo}</strong></td>
                        <td>${item.nombre}</td>
                        <td>${item.unidad || '-'}</td>
                        <td><strong style="color: #60a5fa;">${stockFormateado}</strong></td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // FILTRAR INVENTARIO
        function filtrarInventario(texto) {
            const filas = document.querySelectorAll('#tablaInventario tbody tr');
            const textoLower = texto.toLowerCase();

            filas.forEach(fila => {
                const contenido = fila.textContent.toLowerCase();
                fila.style.display = contenido.includes(textoLower) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
