<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --bg: #0a0a0f;
            --bg-card: #16161d;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #2d2d3a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-back {
            padding: 0.6rem 1.2rem;
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-back:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-empresa {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .filters {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        .filter-item {
            flex: 1;
        }

        .filter-item label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 0.7rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .content-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: var(--bg);
        }

        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            border-bottom: 2px solid var(--border);
        }

        th.text-right {
            text-align: right;
        }

        td {
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        td.text-right {
            text-align: right;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        tbody tr.grupo-1 {
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.25) 0%, rgba(30, 58, 138, 0.15) 100%);
        }

        tbody tr.grupo-2 {
            background: linear-gradient(90deg, rgba(124, 45, 18, 0.25) 0%, rgba(124, 45, 18, 0.15) 100%);
        }

        tbody tr.grupo-1:hover {
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.35) 0%, rgba(30, 58, 138, 0.25) 100%);
        }

        tbody tr.grupo-2:hover {
            background: linear-gradient(90deg, rgba(124, 45, 18, 0.35) 0%, rgba(124, 45, 18, 0.25) 100%);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .filters {
                flex-direction: column;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 0.5rem 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-left">
                <h1>📦 Inventario</h1>
                <p id="headerSubtitle">Gestión de Stock</p>
            </div>
            <div class="header-right">
                <a href="principal.html" class="btn-back">← Menú Principal</a>
                <div class="user-info">
                    <div class="user-name" id="headerUsuario">Cargando...</div>
                    <div class="user-empresa" id="headerEmpresa">...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="filters">
            <div class="filter-item">
                <label>Centro de Costo</label>
                <select id="ccostoSelect" onchange="cargarInventario()">
                    <option value="">Cargando...</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Buscar Producto</label>
                <input type="text" placeholder="Nombre o código..." onkeyup="filtrarInventario(this.value)">
            </div>
        </div>

        <div class="content-card">
            <div class="table-container">
                <table id="tablaInventario">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Unidad</th>
                            <th class="text-right">Stock Actual</th>
                        </tr>
                    </thead>
                    <tbody id="inventarioBody">
                        <tr>
                            <td colspan="4" class="loading">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://inventario-app-production-e8c8.up.railway.app/api';
        let sesion = null;
        let inventarioData = [];

        window.addEventListener('DOMContentLoaded', () => {
            verificarSesion();
        });

        function verificarSesion() {
            const sesionGuardada = localStorage.getItem('sesion');
            
            if (!sesionGuardada) {
                window.location.href = 'index.html';
                return;
            }

            sesion = JSON.parse(sesionGuardada);

            if (sesion.expiracion && new Date(sesion.expiracion) < new Date()) {
                localStorage.removeItem('sesion');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('headerUsuario').textContent = sesion.nombre;
            document.getElementById('headerEmpresa').textContent = sesion.empresaNombre;

            cargarCCostos();
        }

        async function cargarCCostos() {
            try {
                const response = await fetch(`${API_BASE}/ccostos?empresa=${sesion.empresa}`);
                const data = await response.json();

                if (data.success) {
                    const select = document.getElementById('ccostoSelect');
                    let html = '<option value="">-- Todos los Centros de Costo --</option>';
                    data.data.forEach(cc => {
                        html += `<option value="${cc.codigo}">${cc.codigo} - ${cc.nombre}</option>`;
                    });
                    select.innerHTML = html;
                    cargarInventario();
                }
            } catch (error) {
                console.error('Error cargando ccostos:', error);
            }
        }

        async function cargarInventario() {
            const ccosto = document.getElementById('ccostoSelect').value;

            try {
                let url = `${API_BASE}/inventario?empresa=${sesion.empresa}`;
                if (ccosto) {
                    url += `&ccosto=${ccosto}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    inventarioData = data.data;
                    renderInventario();
                }
            } catch (error) {
                console.error('Error cargando inventario:', error);
                document.getElementById('inventarioBody').innerHTML = `
                    <tr><td colspan="4" style="text-align: center; color: var(--danger);">
                        ❌ Error al cargar datos
                    </td></tr>
                `;
            }
        }

        function renderInventario() {
            const tbody = document.getElementById('inventarioBody');

            if (inventarioData.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="4" style="text-align: center; padding: 2rem;">
                        No hay productos en este centro de costo
                    </td></tr>
                `;
                return;
            }

            let html = '';
            let currentGrupo = null;
            let grupoIndex = 0;

            inventarioData.forEach(item => {
                if (item.grupo_codigo !== currentGrupo) {
                    currentGrupo = item.grupo_codigo;
                    grupoIndex = grupoIndex === 0 ? 1 : 0;
                }

                const grupoClass = grupoIndex === 0 ? 'grupo-1' : 'grupo-2';
                const stockFormateado = parseFloat(item.stock_actual).toFixed(2);

                html += `
                    <tr class="${grupoClass}">
                        <td><strong>${item.codigo}</strong></td>
                        <td>${item.nombre}</td>
                        <td>${item.unidad || '-'}</td>
                        <td class="text-right"><strong style="color: #60a5fa;">${stockFormateado}</strong></td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function filtrarInventario(texto) {
            const filas = document.querySelectorAll('#tablaInventario tbody tr');
            const textoLower = texto.toLowerCase();

            filas.forEach(fila => {
                const contenido = fila.textContent.toLowerCase();
                fila.style.display = contenido.includes(textoLower) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
